# https://taskfile.dev

version: '3'

tasks:
  clear:
    internal: true
    cmds: [clear]
  tf_init:
    aliases: [i]
    deps: [clear]
    cmds: [terraform init]
  tf_plan:
    aliases: [p]
    deps: [clear]
    cmds: [terraform plan]
  tf_apply:
    aliases: [a]
    deps: [tf_init]
    cmds: [terraform apply -auto-approve]
  tf_destroy:
    deps: [clear]
    cmds: [terraform destroy -auto-approve]
  default:
    deps: [tf_plan]
